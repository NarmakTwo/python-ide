<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="google-site-verification" content="CpAng4m2FN9I3xtFIFi9GPz4MOLer0KbxNSsX8OgLrM" />
        <!-- openrouter tags -->
        <meta property="og:title" content="Nuilith IDE" />
        <meta property="og:description" content="Nuilith Python IDE" />
        <meta property="og:image" content="/assets/icon.png" />
        <title>Nuilith Python IDE</title>
        <!-- basic components -->
        <script src="/coi-serviceworker.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/lib/codemirror.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/mode/python/python.js"></script>
        <link rel="stylesheet" type="text/css" href="https://unpkg.com/codemirror@5.65.21/lib/codemirror.css">
        <link rel="stylesheet" type="text/css" href="/programiz.css">
        <script src="https://unpkg.com/alpinejs" defer></script>

        <!-- codemirror addons -->
        <script src="https://unpkg.com/codemirror@5.65.21/addon/comment/comment.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/search/search.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/search/searchcursor.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/search/jump-to-line.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/dialog/dialog.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.21/addon/dialog/dialog.css">
        <script src="https://unpkg.com/codemirror@5.65.21/addon/edit/move-lines.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/fold/foldgutter.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.21/addon/fold/foldgutter.css">
        <script src="https://unpkg.com/codemirror@5.65.21/addon/fold/indent-fold.js"></script>
        <script src="https://unpkg.com/codemirror@5.65.21/addon/lint/lint.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.21/addon/lint/lint.css">
        <script src="https://unpkg.com/codemirror@5.65.21/addon/hint/show-hint.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/codemirror@5.65.21/addon/hint/show-hint.css">

        <link rel="icon" type="image/png" href="/assets/icon.png" />
        <link rel="stylesheet" type="text/css" href="style.css">

        <!-- code and terminal stuff -->
        <script src="https://unpkg.com/jquery@4.0.0/dist/jquery.js"></script>
        <link rel="stylesheet" href="https://unpkg.com/jquery.terminal@2.45.2/css/jquery.terminal.css">
        <script src="https://unpkg.com/jquery.terminal@2.45.2/js/jquery.terminal.js"></script>
        <script src="https://unpkg.com/jquery.terminal@2.45.2/js/echo_newline.js"></script>
        <script src="https://unpkg.com/jquery.terminal@2.45.2/js/unix_formatting.js"></script>
        <script src="https://unpkg.com/js-polyfills/keyboard.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/jcubic/static/js/wcwidth.js"></script>

        <!-- python runtime environment -->
        <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
        <script src="/index.js"></script>

    </head>
    <body>
        <div class="flex items-center gap-4 m-2" id="info" x-data="{ open: false }">
            <h1 class="text-2xl text-center bg-gray-800 border border-gray-700 pt-4 pb-4 px-6 rounded-2xl flex items-center shadow-lg shadow-black/40">
                <img src="/assets/icon.png" class="w-10 h-10 inline-block mr-2" />
                <span class="clickable" @click="open = true" @click.away="open = false">Nuilith</span>&nbsp;Python IDE
            </h1>

            <div class="absolute mt-32" x-show="open" x-transition.opacity style="display: none; z-index: 50;">
                <span class="text-sm w-80 inline-block border border-gray-800 p-4 rounded-lg bg-gray-800 shadow-md shadow-black/40">
                    <b>Nuilith</b> is a <a class="clickable" href="https://en.wikipedia.org/wiki/Neo-Latin">Neo-Latin</a> pseudoword meaning "No Stupid".
                </span>
            </div>
            
        </div>
        <div class="flex w-full h-100 overflow-hidden" style="height: calc(100vh - 120px);" id="doublepanel">
            <div id="left-pane" class="w-1/2 h-full overflow-hidden border-r-4 border-gray-700 pane">
                <div class="border-t-3 border-b-2 border-gray-700" style="background-color: var(--menu);" id="toolbar-left">
                    <ol class="flex flex-row p-2 items-center justify-end" style="justify-content: space-between;">
                        <li class="items-center justify-center text-center"><p class="flex text-lg w-20 h-8 items-center justify-center text-white align-middle text-center rounded-lg bg-gray-700">main.py</p></li>
                        <li><button class="flex w-25 h-7 rounded-lg text-white border-2 border-white items-center" onclick="loadcode();"><img class="w-5 h-5 ml-1 mr-2 p-0 invert" src="https://cdn-icons-png.flaticon.com/512/12067/12067091.png">Import</button></li>
                        <li><button class="flex w-25 h-7 rounded-lg text-white border-2 border-white items-center" onclick="savecode();"><img class="w-5 h-5 ml-1 mr-2 p-0 invert" src="https://cdn-icons-png.flaticon.com/512/15221/15221871.png">Export</button></li>
                        <li><button class="w-15 h-7 rounded-lg text-white clickbutton" onclick="runcode();">Run</button></li>
                    </ol>
                </div>
                <div class="w-full h-full overflow-hidden" style="background-color: #1C2130;" id="editor"></div>
            </div>
            <div id="divider" class="pane-divider"></div>
            <div class="w-1/2 h-full overflow-hidden pane" id="output">
                <div class="border-t-3 border-b-2 border-gray-700" style="background-color: var(--menu);" id="toolbar-right">
                    <ol class="flex flex-row p-2 items-center justify-end" style="justify-content: space-between;">
                        <li class="items-center justify-center text-center"><p class="flex text-lg w-20 h-8 items-center justify-center text-white align-middle text-center rounded-lg bg-gray-700">Output</p></li>
                        <li><button class="w-15 h-7 rounded-lg text-white border-2 border-white" onclick="term.clear();">Clear</button></li>
                    </ol>
                </div>
                <div id="terminal"></div>
            </div>
        </div>
        
        
    </body>
</html>
